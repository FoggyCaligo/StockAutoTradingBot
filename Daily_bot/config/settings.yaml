market:
  prewarm_start_time: "08:55"
  startup_clear_time: "09:10"
  start_buy_time: "09:30"
  stop_buy_time: "11:30"
  force_sell_time: "15:00"
  reconcile_time: "15:15"
  end_time: "15:20"

universe:
  source: "KOSPI"
  csv_path: ""
  cache_path: "data/kospi_latest.csv"
  refresh_daily: true
  min_market_cap_krw: 250000000000
  min_trading_value_krw: 3000000000

trend_filter:
  enabled: false

strategy:
  top_ratio: 0.25
  max_buy_count: 3
  allow_refill_empty_slots: true
  min_expected_return_percent: 0.7
  min_expected_return_fallback_percents: []
  max_spread_percent: 0.0
  spread_expected_return_multiplier: 0.0
  min_prev_day_change_percent: 0.0
  max_prev_day_change_percent: 10.0
  # 0 or below disables the previous-scan intraday jump filter.
  max_intraday_jump_from_prev_scan_percent: 0.0
  orderbook_bid_linear_decay_min_weight: 0.0
  orderbook_ask_linear_decay_min_weight: 0.0
  sell_tick_offset: 1
  scan_interval_seconds: 60

risk:
  dry_run: false
  max_position_count: 10
  min_slot_count: 3
  slot_budget_unit_krw: 5000000
  max_slot_count: 10
  target_budget_ratio_per_stock: 0.50
  max_budget_per_cycle_krw: 0
  max_budget_per_stock_krw: 0
  max_orderbook_ask_depth_ratio: 0.0
  # Set all stop-loss values to 0 to disable intraday stop-loss handling.
  stop_loss_tick_count: 0
  stop_loss_tick_multiplier: 0.0
  stop_loss_percent: 0.0
  daily_loss_limit_percent: 10.0

# Intraday stop-loss is fully disabled.
# Current live summary:
# - Universe: full KOSPI daily refresh, market cap >= 250B KRW, trading value >= 3B KRW
# - Entry: expected return >= 0.7 only, fallback disabled
# - Orderbook model: symmetric linear decay on both sides (1.0 -> 0.0)
# - Buy flow: up to 3 new buys per scan, refill enabled when empty slots appear
# - Guard: previous-day rise upper bound 10.0%, same-day re-entry block remains available if stop-loss is re-enabled
# - Risk: no intraday stop-loss, force sell at 15:00, daily loss limit 10%

api:
  quote_rate_limit_per_second: 5
  order_rate_limit_per_second: 5

accounting:
  cash_flows: []
  # Example:
  # cash_flows:
  #   - effective_at: "2026-06-05T10:15:00+09:00"
  #     amount_krw: 2000000
  #     note: "intraday deposit"


# 후보 탐색: KOSPI 전체, 시총 2,500억 이상, 거래대금 30억 이상
# 랭킹 컷: 기대수익률 상위 25%만 유지
# 보조 필터: 스프레드/전일 등락률/직전 스캔 급등/호가잔량 비율 필터 비활성화
# 핵심 신호: 20호가 기반 기대수익률 0.7% 이상
# fallback: 후보 부족 시 0.6% -> 0.5% 순서로 완화
# 매수 방식: 한 배치 최대 3종목, 빈 슬롯 발생 시 재진입 허용
# 위험 관리: 4.5% 손절, 15:00 강제매도, 10% 일손실 제한


# 6/16에 봐야 할 것

# 내일 봐야 할 핵심 지표

# 내일 돌렸을 때는 이 순서로 보면 돼.

# 매수가 너무 안 나온다
# → max_orderbook_ask_depth_ratio: 호가잔량 비율이 너무 낮을 수 있음.
# 후보는 많은데 실제 target이 적다
# → 호가잔량 필터에서 많이 탈락하는 것일 가능성이 큼.
# 진입 후 바로 손절된다
# → 1%가 너무 타이트하거나, 당일 급락/가짜 호가 필터가 아직 부족한 것.
# 손절 후 바로 반등한다
# → 1%가 너무 짧거나, 진입 타이밍이 너무 빠른 것.
# 13시 이후 손실이 많다
# → 그때 13시 이후 조건 강화만 추가하면 됨.
