market:
  prewarm_start_time: "08:55"
  start_buy_time: "09:30"
  stop_buy_time: "13:00"
  force_sell_time: "15:00"
  reconcile_time: "15:15"
  end_time: "15:20"

universe:
  source: "KOSPI200"
  csv_path: "data/kospi200.csv"
  cache_path: "data/kospi200_latest.csv"
  refresh_daily: true
  min_market_cap_krw: 300000000000
  min_trading_value_krw: 5000000000

trend_filter:
  enabled: true

strategy:
  top_ratio: 0.20
  max_buy_count: 0
  min_expected_return_percent: 0.25
  max_spread_percent: 0.7
  sell_tick_offset: 1
  scan_interval_seconds: 60

risk:
  dry_run: false
  max_position_count: 0
  min_slot_count: 3
  # When set, slot count scales by planning_cash // slot_budget_unit_krw, with min_slot_count as the floor.
  slot_budget_unit_krw: 5000000
  # Ratio-based sizing is kept as a fallback when slot_budget_unit_krw is 0.
  target_budget_ratio_per_stock: 0.50
  max_budget_per_cycle_krw: 0
  max_budget_per_stock_krw: 5000000
  stop_loss_percent: 3.7
  daily_loss_limit_percent: 10.0

api:
  quote_rate_limit_per_second: 5
  order_rate_limit_per_second: 5

accounting:
  cash_flows: []
  # Example:
  # cash_flows:
  #   - effective_at: "2026-06-05T10:15:00+09:00"
  #     amount_krw: 2000000
  #     note: "intraday deposit"
