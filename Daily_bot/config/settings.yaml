market:
  prewarm_start_time: "08:55"
  start_buy_time: "09:10"
  stop_buy_time: "11:45"
  force_sell_time: "14:00"
  reconcile_time: "14:15"
  end_time: "14:20"

universe:
  source: "KOSPI200"
  csv_path: "data/kospi200.csv"
  cache_path: "data/kospi200_latest.csv"
  refresh_daily: true
  min_market_cap_krw: 250000000000
  min_trading_value_krw: 3000000000

trend_filter:
  enabled: true

strategy:
  top_ratio: 0.2
  max_buy_count: 0
  min_expected_return_percent: 0.15
  max_spread_percent: 0.7
  # Require higher expected return when spread is wide: max(base threshold, spread * multiplier).
  spread_expected_return_multiplier: 1.2
  # Exclude names that rose too much on the previous day.
  max_prev_day_change_percent: 7.0
  # Exclude names that already jumped too much versus the previous scan.
  max_intraday_jump_from_prev_scan_percent: 1.0
  sell_tick_offset: 1
  scan_interval_seconds: 60

risk:
  dry_run: false
  max_position_count: 0
  # Keep at least 3 slots even when capital is small.
  min_slot_count: 3
  # Used as the target slot unit when deriving how many slots the account can support.
  slot_budget_unit_krw: 5000000
  # Cap the session slot plan at 10 names.
  max_slot_count: 10
  # Ratio-based sizing is kept as a fallback when slot_budget_unit_krw is 0.
  target_budget_ratio_per_stock: 0.50
  max_budget_per_cycle_krw: 0
  # Hard cap per stock. Actual buy budget is derived from tradeable cash / slots, then capped by this value.
  max_budget_per_stock_krw: 5000000
  # Only allow planned order size up to this share of the top-5 ask depth amount.
  max_orderbook_ask_depth_ratio: 0.30
  # Current active stop-loss percent from entry. This value is being tested aggressively.
  stop_loss_percent: 0.5 # 익절이 평균 0.6%에 대부분 1분 안에 체결된 것으로 보아, 굳이 길게 잡지 말고 손실날 종목은 빠르게 쳐내고 갈아타는 전략. (이게 안통한다면 2.5%로 수정하는 방향이 맞을 듯)
  daily_loss_limit_percent: 10.0

api:
  quote_rate_limit_per_second: 5
  order_rate_limit_per_second: 5

accounting:
  cash_flows: []
  # Example:
  # cash_flows:
  #   - effective_at: "2026-06-05T10:15:00+09:00"
  #     amount_krw: 2000000
  #     note: "intraday deposit"


# 후보 탐색: KOSPI200 전체
# 랭킹 컷: 상위 20%
# 전일 급등: +7% 이상 제외
# 당일 급등: 직전 스캔 대비 +1% 이상 제외
# 스프레드: 최대 0.7%
# 기대수익률: max(0.3%, spread × 1.2)
# 주문충격: 주문금액 <= 5호가 매도잔량의 30%
# 손절: 1%
# 슬롯: 최소 3개, 자금 커지면 증가


