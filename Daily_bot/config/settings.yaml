market:
  prewarm_start_time: "08:55"
  start_buy_time: "09:30"
  stop_buy_time: "11:30"
  force_sell_time: "15:00"
  reconcile_time: "15:15"
  end_time: "15:20"

universe:
  source: "KOSPI"
  csv_path: ""
  cache_path: "data/kospi_latest.csv"
  refresh_daily: true
  min_market_cap_krw: 250000000000
  min_trading_value_krw: 3000000000

trend_filter:
  enabled: false

strategy:
  top_ratio: 1.0
  max_buy_count: 3
  allow_refill_empty_slots: true
  min_expected_return_percent: 0.7
  min_expected_return_fallback_percents: [0.6, 0.5]
  max_spread_percent: 0.0
  spread_expected_return_multiplier: 0.0
  min_prev_day_change_percent: 0.0
  max_prev_day_change_percent: 0.0
  # 0 or below disables the previous-scan intraday jump filter.
  max_intraday_jump_from_prev_scan_percent: 0.0
  sell_tick_offset: 1
  scan_interval_seconds: 60

risk:
  dry_run: false
  max_position_count: 10
  min_slot_count: 3
  slot_budget_unit_krw: 5000000
  max_slot_count: 10
  target_budget_ratio_per_stock: 0.50
  max_budget_per_cycle_krw: 0
  max_budget_per_stock_krw: 0
  max_orderbook_ask_depth_ratio: 0.0
  # Set all stop-loss values to 0 to disable intraday stop-loss handling.
  stop_loss_tick_count: 0
  stop_loss_tick_multiplier: 0.0
  stop_loss_percent: 4.5
  daily_loss_limit_percent: 10.0

# Intraday percent stop-loss is enabled at 4.5%.
# Tick-based stop-loss is currently disabled.

api:
  quote_rate_limit_per_second: 5
  order_rate_limit_per_second: 5

accounting:
  cash_flows: []
  # Example:
  # cash_flows:
  #   - effective_at: "2026-06-05T10:15:00+09:00"
  #     amount_krw: 2000000
  #     note: "intraday deposit"


# 후보 탐색: KOSPI200 전체
# 랭킹 컷: 상위 20%
# 전일 급등: 비활성화
# 당일 급등: 직전 스캔 대비 +1% 이상 제외
# 스프레드: 비활성화
# 기대수익률: 0.15% 이상
# 주문충격: 주문금액 <= 5호가 매도잔량의 30%
# 손절: 1%
# 매수 방식: 최대 3종목 왕복거래형. 보유/미체결로 빈 슬롯만 생겨도 추가 매수하지 않음.


# 6/16에 봐야 할 것

# 내일 봐야 할 핵심 지표

# 내일 돌렸을 때는 이 순서로 보면 돼.

# 매수가 너무 안 나온다
# → max_orderbook_ask_depth_ratio: 호가잔량 비율이 너무 낮을 수 있음.
# 후보는 많은데 실제 target이 적다
# → 호가잔량 필터에서 많이 탈락하는 것일 가능성이 큼.
# 진입 후 바로 손절된다
# → 1%가 너무 타이트하거나, 당일 급락/가짜 호가 필터가 아직 부족한 것.
# 손절 후 바로 반등한다
# → 1%가 너무 짧거나, 진입 타이밍이 너무 빠른 것.
# 13시 이후 손실이 많다
# → 그때 13시 이후 조건 강화만 추가하면 됨.
